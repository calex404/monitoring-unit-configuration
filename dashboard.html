<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grafana Terárium Dashboard</title>
<style>
  * { box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #161719;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    margin: 0;
    min-height: 100vh;
  }

  h1 {
    margin-bottom: 10px;
    color: #f05a28;
    font-size: 2rem;
    letter-spacing: 1px;
  }

  .subtitle {
    color: #888;
    margin-bottom: 40px;
    font-size: 0.9rem;
  }

  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
    width: 100%;
    max-width: 1200px;
  }

  .panel-card {
    background: #212124;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    border: 1px solid #2e2e32;
    display: flex;
    flex-direction: column;
  }

  .panel-title {
    padding: 12px 16px;
    font-size: 0.85rem;
    font-weight: 600;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid #2e2e32;
  }

  iframe {
    border: none;
    width: 100%;
    height: 280px;
    display: block;
  }

  @media (max-width: 768px) {
    .dashboard-grid {
      grid-template-columns: 1fr;
    }
    h1 {
      font-size: 1.5rem;
    }
  }
</style>
</head>
<body>

<h1>Monitorovanie Terária 🦎</h1>
<p class="subtitle">Aktualizuje sa každých 30 sekúnd · Posledných 7 dní</p>

<div class="dashboard-grid">

  <div class="panel-card">
    <div class="panel-title">🌡️ Meranie teploty</div>
    <iframe src="https://valentinaondrejkova.grafana.net/d-solo/va5lmhb/terarium?orgId=1&from=now-7d&to=now&timezone=browser&theme=dark&panelId=panel-4" frameborder="0"></iframe>
  </div>

  <div class="panel-card">
    <div class="panel-title">💧 Meranie vlhkosti</div>
    <iframe src="https://valentinaondrejkova.grafana.net/d-solo/va5lmhb/terarium?orgId=1&from=now-7d&to=now&timezone=browser&theme=dark&panelId=panel-3" frameborder="0"></iframe>
  </div>

  <div class="panel-card">
    <div class="panel-title">💡 Meranie intenzity svetla</div>
    <iframe src="https://valentinaondrejkova.grafana.net/d-solo/va5lmhb/terarium?orgId=1&from=now-7d&to=now&timezone=browser&theme=dark&panelId=panel-1" frameborder="0"></iframe>
  </div>

  <div class="panel-card">
    <div class="panel-title">☀️ Meranie UV žiarenia</div>
    <iframe src="https://valentinaondrejkova.grafana.net/d-solo/va5lmhb/terarium?orgId=1&from=now-7d&to=now&timezone=browser&theme=dark&panelId=panel-2" frameborder="0"></iframe>
  </div>

</div>

</body>
</html>
