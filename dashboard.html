<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafana Terárium Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #161719;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            margin-bottom: 30px;
            color: #f05a28; 
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .panel-card {
            background: #212124;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid #333;
            display: flex;
            justify-content: center;
        }

        iframe {
            border: none;
        }

        @media (max-width: 500px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            iframe {
                width: 100%; 
            }
        }
    </style>
</head>
<body>

    <h1>Monitorovanie Terária 🦎</h1>

    <div style="width: 100%; max-width: 1200px; height: 90vh;">
        <iframe src="https://valentinaondrejkova.grafana.net/public-dashboards/a65b19289d7c4714bdea17868b7a120e" width="100%" height="100%" frameborder="0"></iframe>
    </div>

</body>
</html>
